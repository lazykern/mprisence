# Browsers are intentionally omitted: any http/https `xesam:url` without a
# matching `[website.*]` entry is auto-ignored (see `apply_website_overrides`).
# Unknown browsers (Zen, Vivaldi, LibreWolf, etc.) work without per-app config.

# ------------------------------------------------------------------
# Website overrides — applied when xesam:url host matches the pattern.
# Patterns use the same syntax as [player.*] keys:
#   bare = exact host match (or substring fallback against the host)
#   `*`/`?` wildcards, `re:`/`/.../` for regex
# Match runs against the URL host (e.g. `music.youtube.com`).
# When matched, the fields below overlay the active player's PlayerConfig
# (browsers that ship with `ignore = true` are unmuted automatically by the
# overlay setting `ignore = false` or by the user enabling the browser).
# ------------------------------------------------------------------

[website.youtube_music]
match_pattern = "music.youtube.com"
name = "YouTube Music"
app_id = "1125082278339559505" # shared with [player."*youtube_music*"]
icon = "https://raw.githubusercontent.com/lazykern/mprisence/feat/website-overrides/assets/icons/websites/youtube-music.png"
allow_streaming = true
ignore = false

